<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFE - Personal Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="flex flex-col h-screen w-screen bg-[#f5f5f5] overflow-hidden font-sans text-gray-800">

    <header class="flex items-center justify-between px-4 py-3 bg-[#1a1a1a] text-white">
        <div class="flex items-center space-x-2">
            <div class="w-6 h-6 bg-red-600 rounded-sm"></div>
            <span class="font-bold text-lg tracking-wider">PDF<span class="text-sm">E</span></span>
        </div>
        
        <div class="text-sm font-medium tracking-wide">
            PatientScript 2026-02-23 (5).pdf
        </div>
        
        <button class="text-gray-400 hover:text-white transition-colors">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
    </header>

    <div class="flex items-center justify-between px-4 py-2 bg-white border-b border-gray-200 shadow-sm z-10">
        <div class="flex items-center space-x-4 text-gray-300">
            <i class="fa-solid fa-rotate-left cursor-not-allowed"></i>
            <i class="fa-solid fa-rotate-right cursor-not-allowed"></i>
        </div>

        <div class="flex items-center space-x-6 text-gray-600 text-xs">
            <button class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-pen-nib text-lg mb-1"></i><span class="text-[10px] font-medium">Sign</span>
            </button>
            <button class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-font text-lg mb-1"></i><span class="text-[10px] font-medium">Add text</span>
            </button>
            <button class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-pen-to-square text-lg mb-1"></i><span class="text-[10px] font-medium">Edit text</span>
            </button>
            <button class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-highlighter text-lg mb-1"></i><span class="text-[10px] font-medium">Highlight</span>
            </button>
            <button class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-eraser text-lg mb-1"></i><span class="text-[10px] font-medium">Eraser</span>
            </button>
            <button class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors text-blue-600">
                <i class="fa-solid fa-arrow-pointer text-lg mb-1"></i><span class="text-[10px] font-medium">Pointer</span>
            </button>
            <button class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-shapes text-lg mb-1"></i><span class="text-[10px] font-medium">Shapes</span>
            </button>
            <button class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-magnifying-glass text-lg mb-1"></i><span class="text-[10px] font-medium">Find</span>
            </button>
            <button class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-lock text-lg mb-1"></i><span class="text-[10px] font-medium">Protect</span>
            </button>
        </div>

        <div class="flex items-center space-x-3">
            <button class="p-2 text-gray-600 hover:bg-gray-100 rounded-md">
                <i class="fa-solid fa-arrow-up-from-bracket"></i>
            </button>
            <button class="flex items-center space-x-2 bg-[#1a1a1a] text-white px-4 py-2 rounded-md hover:bg-black transition-colors text-sm font-medium">
                <i class="fa-solid fa-download"></i>
                <span>Download</span>
            </button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="flex items-center justify-between p-3 border-b border-gray-100">
                <span class="text-sm font-semibold">1</span>
                <div class="flex space-x-1">
                    <button class="p-1 border border-gray-200 rounded bg-white hover:bg-gray-100"><i class="fa-solid fa-bars text-sm"></i></button>
                    <button class="p-1 border border-gray-200 rounded bg-white hover:bg-gray-100"><i class="fa-regular fa-copy text-sm"></i></button>
                    <button class="p-1 border border-gray-200 rounded bg-black text-white"><i class="fa-solid fa-plus text-sm"></i></button>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 bg-[#fcfcfc]">
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="w-full aspect-[1/1.4] bg-white border-2 border-red-500 shadow-sm p-2 flex flex-col justify-between">
                        <div class="w-full h-2 bg-gray-200 mb-1"></div>
                        <div class="w-3/4 h-2 bg-gray-200 mb-1"></div>
                        <div class="w-full h-full bg-gray-100 mt-2"></div>
                    </div>
                    <span class="text-red-500 text-xs font-medium mt-2">Page 1</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-auto p-8 flex justify-center bg-[#eaeaea]">
            <div class="w-full max-w-4xl bg-white shadow-lg border border-gray-300 aspect-[1/1.414] p-12">
                <div class="border border-gray-200 w-full h-full p-8 flex flex-col items-center text-center text-gray-800">
                    <div class="w-12 h-12 rounded-full border-4 border-yellow-400 bg-red-600 mb-4 flex items-center justify-center self-start"></div>
                    <h1 class="text-3xl font-light mb-1">Dr Viresh Manilal Chiman</h1>
                    <p class="text-xs text-gray-500 mb-6">FCPsych, MBBCH ( WITS ) , DMH ( SA )</p>
                    <p class="text-xs text-gray-600 mb-8">AKESO CLINIC PARKTOWN, 6 JUNCTION AVENUE... </p>
                    
                    <div class="grid grid-cols-2 gap-8 w-full text-left text-sm mt-4">
                        <div>
                            <p><strong>Patient:</strong> Olwam Nhose</p>
                            <p><strong>ID No:</strong> 0510036014080</p>
                        </div>
                        <div>
                            <p><strong>Date:</strong> 2025-01-21</p>
                            <p><strong>Gender:</strong> Male</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <aside class="w-80 bg-white border-l border-gray-200 p-6 flex flex-col items-center text-center justify-center">
            <div class="w-48 h-40 bg-red-50 rounded-xl flex items-center justify-center mb-6 relative">
                <div class="absolute w-16 h-16 bg-white shadow-md rounded-md -ml-8 -mt-4 transform -rotate-6"></div>
                <div class="absolute w-16 h-16 bg-white shadow-md rounded-md ml-4 -mt-2"></div>
                <div class="absolute w-16 h-16 bg-red-500 shadow-lg rounded-md ml-12 mt-6 flex items-center justify-center z-10">
                    <i class="fa-solid fa-pen text-white text-2xl"></i>
                </div>
            </div>
            <p class="text-xs text-gray-400">Select a tool to get started</p>
        </aside>

    </div>
</body>
</html>
