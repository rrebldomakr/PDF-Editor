<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFE - Production Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .canvas-container { margin: 0 auto; position: relative; }
    </style>
</head>
<body class="flex flex-col h-screen w-screen bg-[#f5f5f5] overflow-hidden font-sans text-gray-800 select-none">

    <header class="flex items-center justify-between px-4 py-3 bg-[#1a1a1a] text-white">
        <div class="flex items-center space-x-2">
            <div class="w-6 h-6 bg-red-600 rounded-sm"></div>
            <span class="font-bold text-lg tracking-wider">PDF<span class="text-sm">E</span></span>
        </div>
        
        <div id="header-filename" class="text-sm font-medium tracking-wide text-gray-400 italic">
            No document loaded
        </div>
        
        <button class="text-gray-400 hover:text-white transition-colors">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
    </header>

    <div class="flex items-center justify-between px-4 py-2 bg-white border-b border-gray-200 shadow-sm z-10">
        <div class="flex items-center space-x-4 text-gray-300">
            <i class="fa-solid fa-rotate-left cursor-not-allowed"></i>
            <i class="fa-solid fa-rotate-right cursor-not-allowed"></i>
        </div>

        <div class="flex items-center space-x-6 text-gray-600 text-xs" id="toolbar">
            <button id="tool-pointer" class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors text-blue-600 bg-blue-50">
                <i class="fa-solid fa-arrow-pointer text-lg mb-1"></i><span class="text-[10px] font-medium">Pointer</span>
            </button>
            <button id="tool-add-text" class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-font text-lg mb-1"></i><span class="text-[10px] font-medium">Add text</span>
            </button>
            <button id="tool-edit-text" class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-pen-to-square text-lg mb-1"></i><span class="text-[10px] font-medium">Edit text</span>
            </button>
            <button id="tool-brush" class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-paintbrush text-lg mb-1"></i><span class="text-[10px] font-medium">Brush</span>
            </button>
            <button id="tool-eraser" class="flex flex-col items-center justify-center p-2 rounded hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-eraser text-lg mb-1"></i><span class="text-[10px] font-medium">Eraser</span>
            </button>
        </div>

        <div class="flex items-center space-x-3">
            <button id="btn-download" class="flex items-center space-x-2 bg-[#1a1a1a] text-white px-4 py-2 rounded-md hover:bg-black transition-colors text-sm font-medium opacity-50 cursor-not-allowed">
                <i class="fa-solid fa-download"></i>
                <span>Download</span>
            </button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col z-10 shadow-[4px_0_15px_-3px_rgba(0,0,0,0.05)]">
            <div id="sidebar-header" class="flex items-center justify-between p-3 border-b border-gray-100 opacity-50">
                <span id="page-count" class="text-sm font-semibold">0</span>
                <span class="text-xs text-gray-400 font-medium uppercase tracking-wider">Pages</span>
            </div>
            <div id="thumbnail-container" class="flex-1 overflow-y-auto p-4 bg-[#fcfcfc] flex flex-col items-center justify-center text-gray-400 text-sm gap-4">
                No pages loaded
            </div>
        </aside>

        <main id="main-stage" class="flex-1 overflow-y-auto p-8 flex flex-col items-center bg-[#eaeaea] relative">
            <div id="drop-zone" class="w-full max-w-2xl bg-[#fafafa] border-2 border-dashed border-gray-300 rounded-xl aspect-[16/9] flex flex-col items-center justify-center text-gray-400 hover:bg-white hover:border-blue-400 hover:text-blue-500 transition-all cursor-pointer shadow-sm mt-20">
                <i class="fa-solid fa-cloud-arrow-up text-6xl mb-4"></i>
                <h2 class="text-2xl font-medium text-gray-700 mb-2">Drag and drop your PDF</h2>
                <p class="text-sm">or click to browse your files</p>
                <input type="file" id="file-upload" accept="application/pdf" class="hidden">
            </div>
        </main>

        <aside id="right-sidebar" class="w-80 bg-white border-l border-gray-200 p-6 flex flex-col z-10">
            <div id="sidebar-default-state" class="flex flex-col items-center text-center justify-center h-full text-gray-400">
                <i class="fa-solid fa-sliders text-3xl mb-3"></i>
                <p class="text-xs">Select an element to adjust properties</p>
            </div>
            
            <div id="sidebar-active-state" class="hidden flex flex-col space-y-6 w-full">
                <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider border-b border-gray-100 pb-3">Format Options</h3>
                
                <div class="flex flex-col space-y-2">
                    <label class="text-xs font-semibold text-gray-500">Font Family</label>
                    <select id="prop-font-family" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500">
                        <option value="sans-serif">Sans-Serif (Standard)</option>
                        <option value="serif">Serif (Formal)</option>
                        <option value="monospace">Monospace (Code)</option>
                        <option value="Helvetica">Helvetica</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Arial">Arial</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col space-y-2">
                        <label class="text-xs font-semibold text-gray-500">Size (px)</label>
                        <input type="number" id="prop-font-size" value="16" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="flex flex-col space-y-2">
                        <label class="text-xs font-semibold text-gray-500">Text Color</label>
                        <div class="flex items-center space-x-2 bg-gray-50 border border-gray-200 rounded-lg p-1">
                            <input type="color" id="prop-color" value="#000000" class="w-10 h-8 border-0 bg-transparent cursor-pointer rounded">
                            <span id="color-hex" class="text-xs font-mono uppercase text-gray-600">#000000</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-upload');
        const mainStage = document.getElementById('main-stage');
        const headerFilename = document.getElementById('header-filename');
        const thumbnailContainer = document.getElementById('thumbnail-container');
        const pageCountSpan = document.getElementById('page-count');
        const sidebarHeader = document.getElementById('sidebar-header');
        const btnDownload = document.getElementById('btn-download');

        const sidebarDefault = document.getElementById('sidebar-default-state');
        const sidebarActive = document.getElementById('sidebar-active-state');
        const propFontFamily = document.getElementById('prop-font-family');
        const propFontSize = document.getElementById('prop-font-size');
        const propColor = document.getElementById('prop-color');
        const colorHex = document.getElementById('color-hex');
        
        const buttons = {
            pointer: document.getElementById('tool-pointer'),
            addText: document.getElementById('tool-add-text'),
            editText: document.getElementById('tool-edit-text'),
            brush: document.getElementById('tool-brush'),
            eraser: document.getElementById('tool-eraser')
        };

        let currentMode = 'pointer'; 
        let fabricCanvases = [];
        let pdfTextLayers = []; 

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || file.type !== 'application/pdf') return;
            
            headerFilename.textContent = file.name;
            headerFilename.classList.remove('text-gray-400', 'italic');
            headerFilename.classList.add('text-white');
            btnDownload.classList.remove('opacity-50', 'cursor-not-allowed');
            
            dropZone.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-4xl mb-4"></i><p class="text-sm font-medium">Parsing document data...</p>';

            const reader = new FileReader();
            reader.onload = async function(ev) {
                const typedarray = new Uint8Array(ev.target.result);
                
                try {
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    
                    mainStage.innerHTML = '';
                    thumbnailContainer.innerHTML = '';
                    thumbnailContainer.classList.remove('justify-center', 'items-center', 'text-gray-400');
                    sidebarHeader.classList.remove('opacity-50');
                    pageCountSpan.textContent = pdf.numPages;

                    fabricCanvases = [];
                    pdfTextLayers = [];

                    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                        const page = await pdf.getPage(pageNum);
                        const mainViewport = page.getViewport({ scale: 1.5 });
                        
                        // --- EXTRACT EXACT TEXT COORDINATES ---
                        const textContent = await page.getTextContent();
                        const parsedTextItems = textContent.items.map(item => {
                            // Map PDF internal coordinates to actual pixel coordinates on our screen
                            const tx = pdfjsLib.Util.transform(mainViewport.transform, item.transform);
                            const fontHeight = Math.sqrt((tx[2] * tx[2]) + (tx[3] * tx[3]));
                            return {
                                str: item.str,
                                x: tx[4],
                                y: tx[5] - fontHeight, // Adjust from baseline to top-left
                                width: item.width * mainViewport.scale,
                                height: fontHeight,
                                fontName: item.fontName
                            };
                        });
                        pdfTextLayers.push({ page: pageNum, items: parsedTextItems });

                        // --- RENDER THUMBNAIL ---
                        const thumbViewport = page.getViewport({ scale: 0.25 });
                        const thumbCanvas = document.createElement('canvas');
                        thumbCanvas.height = thumbViewport.height;
                        thumbCanvas.width = thumbViewport.width;
                        thumbCanvas.className = 'w-3/4 bg-white shadow-sm border border-gray-200 rounded';
                        await page.render({ canvasContext: thumbCanvas.getContext('2d'), viewport: thumbViewport }).promise;
                        
                        const thumbWrapper = document.createElement('div');
                        thumbWrapper.className = 'w-full flex flex-col items-center mb-4';
                        thumbWrapper.innerHTML = `<span class="text-[10px] text-gray-400 mb-1 font-medium">Page ${pageNum}</span>`;
                        thumbWrapper.appendChild(thumbCanvas);
                        thumbnailContainer.appendChild(thumbWrapper);

                        // --- RENDER MAIN PAGE ---
                        const pageContainer = document.createElement('div');
                        pageContainer.className = 'relative mb-10 shadow-2xl border border-gray-300 bg-white';
                        pageContainer.style.width = mainViewport.width + 'px';
                        pageContainer.style.height = mainViewport.height + 'px';

                        const pdfCanvas = document.createElement('canvas');
                        pdfCanvas.height = mainViewport.height;
                        pdfCanvas.width = mainViewport.width;
                        pdfCanvas.className = 'absolute top-0 left-0 z-0'; 
                        pageContainer.appendChild(pdfCanvas);
                        await page.render({ canvasContext: pdfCanvas.getContext('2d'), viewport: mainViewport }).promise;

                        const fabricCanvasEl = document.createElement('canvas');
                        fabricCanvasEl.id = `fabric-page-${pageNum}`;
                        pageContainer.appendChild(fabricCanvasEl);
                        mainStage.appendChild(pageContainer);

                        const fCanvas = new fabric.Canvas(`fabric-page-${pageNum}`, {
                            width: mainViewport.width,
                            height: mainViewport.height,
                            isDrawingMode: false,
                            selection: true
                        });
                        
                        fCanvas.freeDrawingBrush.color = '#ef4444';
                        fCanvas.freeDrawingBrush.width = 3;
                        
                        setupCanvasEvents(fCanvas, pageNum);
                        fabricCanvases.push(fCanvas);
                    }
                    switchMode('pointer');
                } catch (err) {
                    alert("Error: " + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // --- INTERACTION LOGIC ---
        function setupCanvasEvents(fCanvas, pageNum) {
            
            fCanvas.on('selection:created', (e) => updatePropertiesPanel(e.selected[0]));
            fCanvas.on('selection:updated', (e) => updatePropertiesPanel(e.selected[0]));
            fCanvas.on('selection:cleared', () => handleSidebarVisibility());

            fCanvas.on('mouse:down', function(options) {
                
                // ERASER LOGIC: Target and destroy
                if (currentMode === 'eraser') {
                    if (options.target) {
                        fCanvas.remove(options.target);
                    }
                    return;
                }

                // If clicking an existing fabric object, don't trigger text logic
                if (options.target && (currentMode === 'addText' || currentMode === 'editText')) return;

                const pointer = fCanvas.getPointer(options.e);
                let clickX = pointer.x;
                let clickY = pointer.y;

                // ADD TEXT (Dumb & Reliable)
                if (currentMode === 'addText') {
                    const text = new fabric.IText('New Text', {
                        left: clickX,
                        top: clickY - 10,
                        fontFamily: 'sans-serif',
                        fontSize: 20,
                        fill: '#000000',
                        editable: true
                    });
                    fCanvas.add(text);
                    fCanvas.setActiveObject(text);
                    text.enterEditing();
                    text.selectAll();
                    switchMode('pointer');
                    return;
                }

                // EDIT TEXT (Smart Masking)
                if (currentMode === 'editText') {
                    const layer = pdfTextLayers[pageNum - 1];
                    let closestItem = null;
                    let minDistance = 20; // Tight radius to ensure accuracy

                    layer.items.forEach(item => {
                        // Check distance to center of the text node
                        const centerX = item.x + (item.width / 2);
                        const centerY = item.y + (item.height / 2);
                        const dist = Math.hypot(clickX - centerX, clickY - centerY);

                        if (dist < minDistance) {
                            minDistance = dist;
                            closestItem = item;
                        }
                    });

                    if (closestItem && closestItem.str.trim() !== '') {
                        // Found a word! Create an editable box with a white background to mask the original
                        const text = new fabric.IText(closestItem.str, {
                            left: closestItem.x,
                            top: closestItem.y,
                            fontFamily: closestItem.fontName.toLowerCase().includes('serif') ? 'serif' : 'sans-serif',
                            fontSize: Math.round(closestItem.height),
                            fill: '#000000',
                            backgroundColor: '#ffffff', // This is the magic whiteout patch
                            editable: true
                        });

                        fCanvas.add(text);
                        fCanvas.setActiveObject(text);
                        text.enterEditing();
                        text.selectAll();
                        switchMode('pointer');
                    }
                }
            });
        }

        function updatePropertiesPanel(activeObject) {
            if (!activeObject || activeObject.type !== 'i-text') {
                handleSidebarVisibility();
                return;
            }
            
            sidebarDefault.classList.add('hidden');
            sidebarActive.classList.remove('hidden');

            propFontFamily.value = activeObject.fontFamily || 'sans-serif';
            propFontSize.value = Math.round(activeObject.fontSize);
            propColor.value = activeObject.fill;
            colorHex.textContent = activeObject.fill;
        }

        function handleSidebarVisibility() {
            sidebarActive.classList.add('hidden');
            sidebarDefault.classList.remove('hidden');
        }

        propFontFamily.addEventListener('change', (e) => {
            const active = getActiveCanvasObject();
            if (active) { active.set('fontFamily', e.target.value); renderAllCanvases(); }
        });

        propFontSize.addEventListener('input', (e) => {
            const active = getActiveCanvasObject();
            if (active) { active.set('fontSize', parseInt(e.target.value) || 12); renderAllCanvases(); }
        });

        propColor.addEventListener('input', (e) => {
            colorHex.textContent = e.target.value;
            const active = getActiveCanvasObject();
            if (active) { active.set('fill', e.target.value); renderAllCanvases(); }
        });

        function getActiveCanvasObject() {
            for (let i = 0; i < fabricCanvases.length; i++) {
                const active = fabricCanvases[i].getActiveObject();
                if (active) return active;
            }
            return null;
        }

        function renderAllCanvases() {
            fabricCanvases.forEach(c => c.renderAll());
        }

        function switchMode(mode) {
            currentMode = mode;
            
            Object.keys(buttons).forEach(k => {
                if (k === mode) {
                    buttons[k].classList.add('text-blue-600', 'bg-blue-50');
                } else {
                    buttons[k].classList.remove('text-blue-600', 'bg-blue-50');
                }
            });

            fabricCanvases.forEach(canvas => {
                canvas.isDrawingMode = (mode === 'brush');
                canvas.discardActiveObject().renderAll();
                
                if (mode === 'pointer') {
                    canvas.getObjects().forEach(obj => obj.set('selectable', true));
                } else {
                    canvas.getObjects().forEach(obj => obj.set('selectable', false));
                }
                
                // Change cursor dynamically so you know what tool is active
                if (mode === 'eraser') canvas.defaultCursor = 'crosshair';
                else if (mode === 'addText' || mode === 'editText') canvas.defaultCursor = 'text';
                else canvas.defaultCursor = 'default';
            });
        }

        buttons.pointer.addEventListener('click', () => switchMode('pointer'));
        buttons.addText.addEventListener('click', () => switchMode('addText'));
        buttons.editText.addEventListener('click', () => switchMode('editText'));
        buttons.brush.addEventListener('click', () => switchMode('brush'));
        buttons.eraser.addEventListener('click', () => switchMode('eraser'));

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                fabricCanvases.forEach(canvas => {
                    const active = canvas.getActiveObject();
                    // Don't delete if they are currently typing inside the box
                    if (active && !active.isEditing) {
                        canvas.remove(active);
                    }
                });
            }
        });
    </script>
</body>
</html>
